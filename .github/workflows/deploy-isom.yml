name: OSL Pipeline — Deploy .isom Files

on:
  pull_request:
    paths:
      - "incoming/**"

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-deploy:
    name: Validate & Deploy .isom
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run OSL Pipeline deployment script
        run: python scripts/deploy_isom.py

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # 変更がある場合のみコミットしてプッシュ
          if ! git diff --cached --quiet; then
            git commit -m "docs: auto-format and deploy .isom files"
            # PRのソースブランチに対して強制的にフルリファレンスでプッシュ
            git push origin HEAD:refs/heads/${{ github.head_ref }}
          fi
